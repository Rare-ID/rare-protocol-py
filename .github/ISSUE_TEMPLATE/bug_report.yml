name: Bug report
description: Report a reproducible bug in the public protocol repository
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What broke and what did you expect instead?
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Package version
      description: Which package and version are affected?
      placeholder: rare-identity-protocol 0.1.0
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction
      description: Minimal steps, inputs, or tokens needed to reproduce the issue
    validations:
      required: true
  - type: textarea
    id: impact
    attributes:
      label: Impact
      description: Does this affect correctness, compatibility, or security?
